<html>
<head>
  <title>Shortcut</title>
  <script type="module">
    import { store } from "/plugins/slash_shortcuts/webui/slash-shortcuts-manager-store.js?v=2.4.8";
  </script>
</head>
<body>
  <div x-data>
    <template x-if="$store.slashShortcutsManager">
      <div class="ss-editor" x-create="$el.closest('.modal')?.querySelector('.modal-title') && ($el.closest('.modal').querySelector('.modal-title').textContent = $store.slashShortcutsManager.editorTitle)">
        <div class="ss-editor-header">
          <div class="ss-editor-copy">
            <div class="ss-editor-title" x-text="$store.slashShortcutsManager.editorTitle"></div>
            <div class="ss-editor-subtitle">Saving writes the underlying <code>.shortcut.md</code> file for <span x-text="$store.slashShortcutsManager.selectedScopeLabel"></span>.</div>
          </div>
        </div>

        <div class="ss-editor-grid">
          <label class="ss-field"><span>Shortcut name</span><input type="text" x-model="$store.slashShortcutsManager.editor.name" placeholder="summarize" autocomplete="off"></label>
          <label class="ss-field"><span>Display label</span><input type="text" x-model="$store.slashShortcutsManager.editor.displayLabel" placeholder="Summarize"></label>
        </div>

        <div class="ss-editor-grid">
          <label class="ss-field"><span>Description</span><input type="text" x-model="$store.slashShortcutsManager.editor.description" placeholder="Short help text shown in the popup."></label>
          <label class="ss-field"><span>Argument hint or example</span><input type="text" x-model="$store.slashShortcutsManager.editor.argumentHint" placeholder="Use /shortcut(arguments here)"></label>
        </div>

        <label class="ss-field ss-field-body"><span>Instruction template</span><textarea x-model="$store.slashShortcutsManager.editor.instruction" rows="14" placeholder="Write the reusable instruction text. Use $ARGUMENTS or $0..$9 with /shortcut(arguments here)."></textarea></label>

        <div class="ss-editor-help">
          <span class="ss-help-chip">/shortcut(arguments)</span>
          <span class="ss-help-chip">$ARGUMENTS</span>
          <span class="ss-help-chip">$0..$9</span>
          <span class="ss-help-copy">Shortcuts arguments use explicit parentheses so multiple shortcuts can coexist in one message without ambiguity.</span>
        </div>

        <template x-if="$store.slashShortcutsManager.editor.path">
          <div class="ss-editor-path"><span class="material-symbols-outlined">description</span><span x-text="$store.slashShortcutsManager.editor.path"></span></div>
        </template>
      </div>
    </template>
  </div>

  <div class="modal-footer" data-modal-footer>
    <button class="btn btn-ok" @click="$store.slashShortcutsManager.saveEditor()" :disabled="$store.slashShortcutsManager.saving">Save</button>
    <button class="btn btn-cancel" @click="$store.slashShortcutsManager.closeEditor()">Cancel</button>
  </div>

  <style>
    .ss-editor,.ss-editor-copy,.ss-field{display:flex;flex-direction:column}.ss-editor{gap:1rem;padding:1rem 1.1rem 1.2rem}.ss-editor-title{font-size:1.02rem;font-weight:600}.ss-editor-subtitle,.ss-editor-path,.ss-help-copy{margin-top:.25rem;color:var(--color-text-secondary);font-size:.88rem;line-height:1.45}.ss-editor-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.85rem}.ss-field{gap:.4rem}.ss-field span{font-size:.82rem;font-weight:600;color:var(--color-text-secondary)}.ss-field textarea,.ss-field input{width:100%}.ss-field-body textarea{min-height:18rem;resize:vertical;font-family:"Roboto Mono",monospace}.ss-editor-help{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}.ss-help-chip{display:inline-flex;align-items:center;padding:.22rem .55rem;border-radius:999px;background:color-mix(in srgb,var(--color-highlight) 12%,transparent);border:1px solid color-mix(in srgb,var(--color-highlight) 24%,transparent);font-family:"Roboto Mono",monospace;font-size:.8rem}.ss-editor-path{display:inline-flex;align-items:center;gap:.45rem;font-family:"Roboto Mono",monospace;font-size:.78rem;word-break:break-all}@media (max-width:760px){.ss-editor-grid{grid-template-columns:1fr}}
  </style>
</body>
</html>
