<html>
<head>
  <title>Shortcuts</title>
  <script type="module">
    import { store } from "/plugins/slash_shortcuts/webui/slash-shortcuts-manager-store.js?v=2.4.8";
  </script>
</head>
<body>
  <div x-data="{ inModal: false }" x-init="inModal = !!$el.closest('.modal')">
    <template x-if="$store.slashShortcutsManager && inModal">
      <div class="ss-manager" x-create="$store.slashShortcutsManager.onOpen()" x-destroy="$store.slashShortcutsManager.cleanup()">
        <div class="ss-toolbar">
          <div class="ss-toolbar-copy">
            <div class="ss-title">Shortcuts</div>
            <div class="ss-subtitle">Reusable shortcuts with global and project scope.</div>
          </div>
          <div class="ss-toolbar-controls">
            <div class="ss-select" x-data="{ open: false }" @keydown.escape.stop="open = false" @click.outside="open = false">
              <span>Project</span>
              <button type="button" class="ss-select-trigger" :class="{ 'open': open }" @click="open = !open">
                <span class="ss-select-trigger-label" x-text="$store.slashShortcutsManager.projectName ? (($store.slashShortcutsManager.projects.find((project) => project.key === $store.slashShortcutsManager.projectName) || {}).label || $store.slashShortcutsManager.projectName) : 'Global'"></span>
                <span class="material-symbols-outlined">expand_more</span>
              </button>
              <div class="ss-select-menu" x-show="open" x-transition.origin.top.left>
                <button type="button" class="ss-select-option" :class="{ 'active': !$store.slashShortcutsManager.projectName }" @click="$store.slashShortcutsManager.projectName = ''; open = false; $store.slashShortcutsManager.onScopeChanged()">
                  <span>Global</span>
                </button>
                <template x-for="project in $store.slashShortcutsManager.projects" :key="project.key">
                  <button type="button" class="ss-select-option" :class="{ 'active': project.key === $store.slashShortcutsManager.projectName }" @click="$store.slashShortcutsManager.projectName = project.key; open = false; $store.slashShortcutsManager.onScopeChanged()">
                    <span x-text="project.label"></span>
                  </button>
                </template>
              </div>
            </div>
            <div class="ss-toolbar-actions">
              <button type="button" class="button secondary" @click="$store.slashShortcutsManager.refresh()"><span class="material-symbols-outlined">refresh</span><span>Refresh</span></button>
              <button type="button" class="button secondary" @click="$store.slashShortcutsManager.browseScopeFolder()"><span class="material-symbols-outlined">folder_open</span><span>Browse Scope Folder</span></button>
              <button type="button" class="button primary" @click="$store.slashShortcutsManager.openCreateShortcut()"><span class="material-symbols-outlined">add</span><span>Create Shortcut</span></button>
            </div>
          </div>
        </div>

        <div class="ss-scope-banner" x-show="$store.slashShortcutsManager.scope">
          <div class="ss-scope-banner-label"><span class="material-symbols-outlined">target</span><span x-text="$store.slashShortcutsManager.selectedScopeLabel"></span></div>
          <div class="ss-scope-banner-path" x-text="$store.slashShortcutsManager.selectedScopeDirectory"></div>
        </div>

        <div class="ss-loading" x-show="$store.slashShortcutsManager.loading"><span class="material-symbols-outlined spinning">progress_activity</span><span>Loading shortcuts...</span></div>

        <div class="ss-list" x-show="!$store.slashShortcutsManager.loading">
          <template x-if="$store.slashShortcutsManager.hasShortcuts">
            <div class="ss-grid">
              <template x-for="shortcut in $store.slashShortcutsManager.shortcuts" :key="shortcut.path">
                <article class="ss-card">
                  <div class="ss-card-header">
                    <div class="ss-card-copy">
                      <div class="ss-card-title"><span class="ss-slash">/</span><span x-text="shortcut.command"></span></div>
                      <div class="ss-card-description" x-text="shortcut.description"></div>
                    </div>
                    <div class="ss-card-actions">
                      <button type="button" class="button icon" title="Edit shortcut" @click="$store.slashShortcutsManager.openEditShortcut(shortcut)"><span class="material-symbols-outlined">edit</span></button>
                      <button type="button" class="button icon" title="Duplicate shortcut" @click="$store.slashShortcutsManager.duplicateShortcut(shortcut)"><span class="material-symbols-outlined">content_copy</span></button>
                      <button type="button" class="button icon danger" title="Delete shortcut" @click.stop="$confirmClick($event, () => $store.slashShortcutsManager.deleteShortcut(shortcut))"><span class="material-symbols-outlined">delete</span></button>
                    </div>
                  </div>

                  <div class="ss-card-meta">
                    <div class="ss-card-badges">
                      <span class="ss-badge scope" x-text="shortcut.scope_label"></span>
                      <template x-if="shortcut.override_count">
                        <span class="ss-badge override" x-text="$store.slashShortcutsManager.overrideBadgeLabel(shortcut)"></span>
                      </template>
                    </div>

                    <template x-if="shortcut.display_label">
                      <div class="ss-card-label-row">
                        <span class="ss-card-label-key">Label</span>
                        <span class="ss-card-label-value" x-text="shortcut.display_label"></span>
                      </div>
                    </template>

                    <div class="ss-card-path" x-text="shortcut.path"></div>
                  </div>
                </article>
              </template>
            </div>
          </template>

          <template x-if="!$store.slashShortcutsManager.hasShortcuts">
            <div class="ss-empty-state">
              <div class="ss-empty-title">No shortcuts in this scope yet.</div>
              <div class="ss-empty-copy">Create global or project slash shortcuts here. They will appear from <code>/</code> in chat and can be used multiple times in one message.</div>
              <button type="button" class="button primary" @click="$store.slashShortcutsManager.openCreateShortcut()"><span class="material-symbols-outlined">add</span><span>Create Shortcut</span></button>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>

  <style>
    .ss-manager,
    .ss-toolbar,
    .ss-toolbar-copy,
    .ss-select,
    .ss-card,
    .ss-card-copy,
    .ss-card-meta,
    .ss-empty-state {
      display: flex;
      flex-direction: column;
    }

    .ss-manager {
      gap: 1rem;
      padding: 1rem;
    }

    .ss-toolbar {
      gap: 1rem;
      padding: 1rem;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      background: color-mix(in srgb, var(--color-panel) 88%, transparent);
    }

    .ss-title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .ss-subtitle,
    .ss-scope-banner-path,
    .ss-card-description,
    .ss-card-path,
    .ss-empty-copy,
    .ss-card-label-key {
      color: var(--color-text-secondary);
    }

    .ss-toolbar-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: end;
      justify-content: space-between;
    }

    .ss-select {
      gap: 0.35rem;
      min-width: 14rem;
      flex: 0 0 14rem;
      margin-right: auto;
      position: relative;
    }

    .ss-select-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.65rem 0.8rem;
      border: 1px solid var(--color-border);
      border-radius: 10px;
      background: color-mix(in srgb, var(--color-background) 82%, var(--color-panel));
      color: var(--color-text);
      cursor: pointer;
      text-align: left;
    }

    .ss-select-trigger.open {
      border-color: color-mix(in srgb, var(--color-highlight) 35%, var(--color-border));
    }

    .ss-select-trigger-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--color-text);
      font-size: 0.92rem;
      font-weight: 500;
    }

    .ss-select-menu {
      position: absolute;
      top: calc(100% + 0.35rem);
      left: 100%;
      margin-left: 0.5rem;
      z-index: 40;
      min-width: 18rem;
      max-width: min(26rem, 60vw);
      max-height: 18rem;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      padding: 0.4rem;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      background: color-mix(in srgb, var(--color-panel) 96%, var(--color-background));
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
    }

    .ss-select-option {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--color-text);
      cursor: pointer;
      text-align: left;
    }

    .ss-select-option:hover,
    .ss-select-option.active {
      background: color-mix(in srgb, var(--color-highlight) 14%, var(--color-panel));
    }

    .ss-select span {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--color-text-secondary);
    }

    .ss-toolbar-actions,
    .ss-card-actions,
    .ss-card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .ss-toolbar-actions {
      margin-left: 0;
      justify-content: flex-end;
      flex: 1 1 auto;
    }

    .ss-scope-banner {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      padding: 0.85rem 1rem;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      background: color-mix(in srgb, var(--color-background) 84%, var(--color-panel));
    }

    .ss-scope-banner-label {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-weight: 600;
    }

    .ss-loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.9rem 1rem;
      color: var(--color-text-secondary);
      border: 1px dashed var(--color-border);
      border-radius: 10px;
    }

    .ss-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(18rem, 1fr));
      gap: 0.9rem;
    }

    .ss-card {
      gap: 0.9rem;
      padding: 1rem;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      background: color-mix(in srgb, var(--color-panel) 90%, transparent);
    }

    .ss-card-header {
      display: flex;
      gap: 0.75rem;
      justify-content: space-between;
      align-items: flex-start;
    }

    .ss-card-copy {
      gap: 0.3rem;
      min-width: 0;
      flex: 1 1 auto;
    }

    .ss-card-title {
      font-size: 1rem;
      font-weight: 600;
      word-break: break-word;
    }

    .ss-card-description {
      line-height: 1.35;
    }

    .ss-slash {
      color: var(--color-highlight);
    }

    .ss-card-actions {
      flex-direction: column;
      align-items: stretch;
      flex: 0 0 auto;
    }

    .ss-card-meta {
      gap: 0.65rem;
      padding-top: 0.1rem;
    }

    .ss-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.22rem 0.5rem;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .ss-badge.scope {
      background: color-mix(in srgb, var(--color-highlight) 12%, transparent);
      border-color: color-mix(in srgb, var(--color-highlight) 24%, transparent);
    }

    .ss-badge.override {
      background: color-mix(in srgb, #f39c12 12%, transparent);
      border-color: color-mix(in srgb, #f39c12 28%, transparent);
    }

    .ss-card-label-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      min-width: 0;
    }

    .ss-card-label-key {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.18rem 0.42rem;
      border-radius: 999px;
      border: 1px solid var(--color-border);
      background: color-mix(in srgb, var(--color-background) 82%, var(--color-panel));
      flex: 0 0 auto;
    }

    .ss-card-label-value {
      font-weight: 600;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .ss-card-path,
    .ss-scope-banner-path {
      font-family: "Roboto Mono", monospace;
      font-size: 0.82rem;
      word-break: break-all;
    }

    .ss-empty-state {
      gap: 0.85rem;
      padding: 1.2rem;
      border: 1px dashed var(--color-border);
      border-radius: 12px;
    }

    .ss-empty-title {
      font-size: 1rem;
      font-weight: 600;
    }
  </style>
</body>
</html>
