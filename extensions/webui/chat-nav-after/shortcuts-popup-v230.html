<html>
<head>
  <script type="module" src="/plugins/slash_shortcuts/webui/slash-shortcuts-store.js?v=2.4.8"></script>
</head>
<body>
  <div x-data>
    <template x-if="$store.slashShortcuts">
      <div class="slash-shortcuts-root" x-init="$store.slashShortcuts.mount()" x-destroy="$store.slashShortcuts.cleanup()">
        <div class="slash-shortcuts-launchers" @mousedown.prevent>
          <button
            type="button"
            class="slash-shortcuts-launcher"
            :class="{ 'active': $store.slashShortcuts.visible && $store.slashShortcuts.isDraftsView }"
            title="Open Drafts in the shared Shortcuts menu"
            @mousedown.prevent="$store.slashShortcuts.toggleDraftsPopup()"
          >
            <span class="material-symbols-outlined">note_stack</span>
            <span>Drafts</span>
            <span class="slash-shortcuts-count-badge" x-show="$store.slashShortcuts.draftPanelCount > 0" x-text="$store.slashShortcuts.draftPanelCount"></span>
          </button>

          <button
            type="button"
            class="slash-shortcuts-launcher pin"
            :disabled="!$store.slashShortcuts.composerHasText || $store.slashShortcuts.draftSaving || $store.slashShortcuts.draftsLoading"
            title="Save the current composer text to the active draft scope"
            @mousedown.prevent="$store.slashShortcuts.pinCurrentDraft()"
          >
            <span class="material-symbols-outlined">push_pin</span>
            <span>Pin Draft</span>
          </button>
        </div>

        <template x-if="$store.slashShortcuts.visible">
          <div class="slash-shortcuts-popup" :class="{ 'compact': $store.slashShortcuts.compactMode, 'drafts-view': $store.slashShortcuts.isDraftsView }" :style="$store.slashShortcuts.popupStyle" @mousedown.prevent @keydown.escape.stop.prevent="$store.slashShortcuts.close()">
            <div class="slash-shortcuts-header">
              <div class="slash-shortcuts-header-copy">
                <span class="slash-shortcuts-title" x-text="$store.slashShortcuts.isDraftsView ? 'Drafts' : 'Shortcuts'"></span>
                <span class="slash-shortcuts-query" x-text="$store.slashShortcuts.currentQueryDisplay"></span>
              </div>
              <button type="button" class="slash-shortcuts-close" title="Close" @mousedown.prevent="$store.slashShortcuts.close()">
                <span class="material-symbols-outlined">close</span>
              </button>
            </div>

            <div class="slash-shortcuts-nav">
              <button
                type="button"
                class="slash-shortcuts-nav-button"
                :class="{ 'active': $store.slashShortcuts.isShortcutsView }"
                @mousedown.prevent="$store.slashShortcuts.switchView('shortcuts')"
              >
                <span class="material-symbols-outlined">terminal</span>
                <span>Shortcuts</span>
              </button>
              <button
                type="button"
                class="slash-shortcuts-nav-button"
                :class="{ 'active': $store.slashShortcuts.isDraftsView }"
                @mousedown.prevent="$store.slashShortcuts.switchView('drafts')"
              >
                <span class="material-symbols-outlined">note_stack</span>
                <span>Drafts</span>
                <span class="slash-shortcuts-count-badge" x-show="$store.slashShortcuts.draftPanelCount > 0" x-text="$store.slashShortcuts.draftPanelCount"></span>
              </button>
            </div>

            <template x-if="$store.slashShortcuts.isShortcutsView">
              <div class="slash-shortcuts-view">
                <template x-if="$store.slashShortcuts.filteredCommands.length === 0">
                  <div class="slash-shortcuts-empty">
                    <div>No matching shortcuts</div>
                    <button type="button" class="slash-shortcuts-create" @mousedown.prevent="$store.slashShortcuts.openCreateShortcut()">Create this shortcut</button>
                  </div>
                </template>

                <template x-for="(item, index) in $store.slashShortcuts.filteredCommands" :key="item._id || index">
                  <button type="button" class="slash-shortcuts-item" :class="{ 'active': index === $store.slashShortcuts.selectedIndex }" @mouseenter="$store.slashShortcuts.setSelectedIndex(index)" @mousedown.prevent="$store.slashShortcuts.applyByIndex(index)">
                    <div class="slash-shortcuts-item-main">
                      <span class="slash-shortcuts-trigger" x-text="'/' + (item.command || '')"></span>
                      <span class="slash-shortcuts-label" x-text="item.display_label || item.command || ''"></span>
                      <span class="slash-shortcuts-scope" x-show="item.scope_label" x-text="item.scope_label || ''"></span>
                    </div>
                    <div class="slash-shortcuts-description" x-show="$store.slashShortcuts.showDescriptions && item.description" x-text="item.description || ''"></div>
                    <div class="slash-shortcuts-arg-hint" x-show="item.argument_hint" x-text="'Argument hint: ' + (item.argument_hint || '')"></div>
                  </button>
                </template>

                <button type="button" class="slash-shortcuts-footer-action" @mousedown.prevent="$store.slashShortcuts.openCreateShortcut()">
                  <span class="material-symbols-outlined">add</span>
                  <span>Add shortcut</span>
                </button>
              </div>
            </template>

            <template x-if="$store.slashShortcuts.isDraftsView">
              <div class="slash-shortcuts-view drafts minimal-drafts-view">
                <div class="slash-shortcuts-draft-scope-row minimal">
                  <template x-for="scope in $store.slashShortcuts.availableDraftScopes" :key="scope.key">
                    <button
                      type="button"
                      class="slash-shortcuts-nav-button slash-shortcuts-draft-scope-button"
                      :class="{ 'active': scope.key === $store.slashShortcuts.draftScopeKey }"
                      :disabled="!scope.enabled || $store.slashShortcuts.draftsLoading"
                      @mousedown.prevent="$store.slashShortcuts.selectDraftScope(scope.key)"
                    >
                      <span x-text="scope.label"></span>
                    </button>
                  </template>
                </div>

                <template x-if="$store.slashShortcuts.draftsLoading">
                  <div class="slash-shortcuts-empty drafts-empty minimal">
                    <div>Loading…</div>
                  </div>
                </template>

                <template x-if="!$store.slashShortcuts.draftsLoading && !$store.slashShortcuts.hasDraftPanelItems">
                  <div class="slash-shortcuts-empty drafts-empty minimal">
                    <div>No drafts</div>
                  </div>
                </template>

                <div class="slash-shortcuts-draft-list minimal" x-show="!$store.slashShortcuts.draftsLoading && $store.slashShortcuts.hasDraftPanelItems">
                  <template x-for="item in $store.slashShortcuts.draftPanelItems" :key="item.path || item.id">
                    <section class="slash-shortcuts-draft-card minimal">
                      <div class="slash-shortcuts-draft-card-preview minimal" x-text="item.excerpt"></div>
                      <div class="slash-shortcuts-draft-card-meta-row minimal">
                        <span class="slash-shortcuts-draft-card-meta" x-text="item.wordCount + ' words'"></span>
                      </div>
                      <div class="slash-shortcuts-draft-card-actions-group minimal">
                        <button type="button" class="slash-shortcuts-draft-action minimal" title="Restore to composer" @mousedown.prevent="$store.slashShortcuts.restoreDraft(item)">
                          <span class="material-symbols-outlined">restore_page</span>
                          <span>Restore to Composer</span>
                        </button>
                        <template x-for="scope in $store.slashShortcuts.availableDraftScopes.filter(scope => scope.enabled && scope.key !== $store.slashShortcuts.draftScopeKey)" :key="(item.path || item.id) + '-' + scope.key">
                          <button type="button" class="slash-shortcuts-draft-action minimal secondary" :title="'Move draft to ' + scope.label" @mousedown.prevent="$store.slashShortcuts.moveDraftToScope(item, scope.key)">
                            <span class="material-symbols-outlined">add</span>
                            <span x-text="'Move to ' + scope.label"></span>
                          </button>
                        </template>
                        <button type="button" class="slash-shortcuts-draft-action danger minimal" title="Delete draft" @mousedown.prevent="$store.slashShortcuts.removeDraft(item)">
                          <span class="material-symbols-outlined">close</span>
                          <span>Delete</span>
                        </button>
                      </div>
                    </section>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>
  </div>

  <style>
    .slash-shortcuts-root{display:block;margin-top:.45rem}.slash-shortcuts-launchers{display:flex;justify-content:flex-end;gap:.5rem;flex-wrap:wrap}.slash-shortcuts-launcher,.slash-shortcuts-nav-button,.slash-shortcuts-draft-action,.slash-shortcuts-footer-action,.slash-shortcuts-create,.slash-shortcuts-close{display:inline-flex;align-items:center;gap:.42rem;border:1px solid var(--color-border);border-radius:999px;padding:.42rem .78rem;background:color-mix(in srgb,var(--color-panel) 95%,transparent);color:var(--color-text-secondary);cursor:pointer;font-size:.78rem;font-weight:700;transition:background .12s ease,color .12s ease,border-color .12s ease}.slash-shortcuts-launcher:hover,.slash-shortcuts-nav-button:hover,.slash-shortcuts-draft-action:hover,.slash-shortcuts-footer-action:hover,.slash-shortcuts-create:hover,.slash-shortcuts-close:hover{background:color-mix(in srgb,#4248f1 12%,var(--color-panel) 88%);color:var(--color-text)}.slash-shortcuts-launcher:disabled{opacity:.55;cursor:not-allowed}.slash-shortcuts-launcher.active,.slash-shortcuts-nav-button.active{background:color-mix(in srgb,#4248f1 16%,var(--color-panel) 84%);color:var(--color-text);border-color:color-mix(in srgb,#4248f1 38%,var(--color-border))}.slash-shortcuts-launcher.pin,.slash-shortcuts-draft-action.pin{border-color:color-mix(in srgb,#f0b35a 55%,var(--color-border));background:color-mix(in srgb,#f0b35a 14%,var(--color-panel) 86%);color:#f6c970}.slash-shortcuts-count-badge{display:inline-flex;align-items:center;justify-content:center;min-width:1.3rem;height:1.3rem;padding:0 .35rem;border-radius:999px;background:color-mix(in srgb,#4248f1 18%,var(--color-panel) 82%);color:var(--color-text);font-size:.68rem;font-weight:800}.slash-shortcuts-popup{position:fixed;z-index:3000;overflow-y:auto;border:1px solid var(--color-border);border-radius:14px;background:color-mix(in srgb,var(--color-panel) 96%,black 4%);box-shadow:0 10px 24px rgba(0,0,0,.28);backdrop-filter:blur(8px)}.slash-shortcuts-header{display:flex;justify-content:space-between;align-items:flex-start;gap:.75rem;padding:.55rem .7rem;border-bottom:1px solid var(--color-border);position:sticky;top:0;background:color-mix(in srgb,var(--color-panel) 97%,black 3%);z-index:2}.slash-shortcuts-header-copy{display:flex;flex-direction:column;gap:.18rem;min-width:0}.slash-shortcuts-title{font-size:.8rem;font-weight:800;letter-spacing:.02em;color:var(--color-text)}.slash-shortcuts-query{font-size:.72rem;color:var(--color-text-muted);line-height:1.35}.slash-shortcuts-close{padding:.35rem .5rem;border-radius:10px}.slash-shortcuts-close .material-symbols-outlined,.slash-shortcuts-launcher .material-symbols-outlined,.slash-shortcuts-nav-button .material-symbols-outlined,.slash-shortcuts-draft-action .material-symbols-outlined,.slash-shortcuts-footer-action .material-symbols-outlined{font-size:1rem}.slash-shortcuts-nav{display:flex;gap:.5rem;padding:.55rem .7rem;border-bottom:1px solid color-mix(in srgb,var(--color-border) 76%,transparent 24%);position:sticky;top:3rem;background:color-mix(in srgb,var(--color-panel) 96%,black 4%);z-index:1}.slash-shortcuts-nav-button{padding:.38rem .68rem}.slash-shortcuts-view{display:flex;flex-direction:column}.slash-shortcuts-empty{padding:.9rem;color:var(--color-text-muted);font-size:.8rem;display:flex;flex-direction:column;gap:.55rem}.slash-shortcuts-empty-copy{font-size:.74rem;line-height:1.45}.slash-shortcuts-create{align-self:flex-start}.slash-shortcuts-item{width:100%;text-align:left;border:0;background:transparent;color:var(--color-text);padding:.58rem .7rem;display:flex;flex-direction:column;gap:.22rem;cursor:pointer;border-bottom:1px solid color-mix(in srgb,var(--color-border) 72%,transparent 28%);transition:background .12s ease}.slash-shortcuts-popup.compact .slash-shortcuts-item{padding:.42rem .6rem;gap:.12rem}.slash-shortcuts-item:last-child{border-bottom:0}.slash-shortcuts-item:hover,.slash-shortcuts-item.active{background:color-mix(in srgb,#4248f1 14%,var(--color-panel) 86%)}.slash-shortcuts-item-main{display:flex;align-items:center;gap:.55rem;min-width:0;flex-wrap:wrap}.slash-shortcuts-trigger{font-family:"Roboto Mono",monospace;font-size:.8rem;color:#8ba4ff;flex-shrink:0;font-weight:700}.slash-shortcuts-label{font-size:.84rem;font-weight:700;color:var(--color-text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.slash-shortcuts-scope{display:inline-flex;align-items:center;padding:.12rem .42rem;border-radius:999px;font-size:.66rem;font-weight:700;line-height:1.2;background:color-mix(in srgb,var(--color-highlight) 12%,transparent);border:1px solid color-mix(in srgb,var(--color-highlight) 24%,transparent);color:var(--color-text-secondary);margin-left:auto;flex-shrink:0}.slash-shortcuts-description,.slash-shortcuts-arg-hint,.slash-shortcuts-drafts-intro,.slash-shortcuts-draft-card-note{font-size:.72rem;color:var(--color-text-muted);line-height:1.45}.slash-shortcuts-arg-hint{color:#8ba4ff;font-family:"Roboto Mono",monospace}.slash-shortcuts-footer-action{width:100%;justify-content:center;border:0;border-top:1px solid var(--color-border);border-radius:0 0 14px 14px;background:color-mix(in srgb,var(--color-panel) 92%,transparent);padding:.58rem .7rem}.slash-shortcuts-view.drafts{padding:.8rem;gap:.8rem}.slash-shortcuts-draft-list{display:flex;flex-direction:column;gap:.8rem}.slash-shortcuts-draft-card{display:flex;flex-direction:column;gap:.75rem;padding:.8rem;border:1px solid color-mix(in srgb,var(--color-border) 92%,white 8%);border-radius:14px;background:color-mix(in srgb,var(--color-panel) 94%,black 6%)}.slash-shortcuts-draft-card-header{display:flex;flex-direction:column;gap:.3rem}.slash-shortcuts-draft-card-title-row{display:flex;align-items:center;justify-content:space-between;gap:.6rem;flex-wrap:wrap}.slash-shortcuts-draft-card-title{font-size:.86rem;font-weight:800;color:var(--color-text)}.slash-shortcuts-draft-card-meta{font-size:.7rem;font-weight:700;color:var(--color-text-secondary)}.slash-shortcuts-draft-card-preview{padding:.7rem .75rem;border-radius:10px;background:color-mix(in srgb,var(--color-background) 82%,var(--color-panel));border:1px solid color-mix(in srgb,var(--color-border) 76%,transparent);font-size:.76rem;line-height:1.45;color:var(--color-text-secondary);white-space:pre-wrap;word-break:break-word}.slash-shortcuts-draft-card-actions-group{display:flex;flex-wrap:wrap;gap:.5rem}.slash-shortcuts-draft-action{font-size:.74rem;padding:.38rem .7rem}.slash-shortcuts-draft-action.danger{border-color:color-mix(in srgb,#dc5f5f 45%,var(--color-border));color:#ff9d9d}.drafts-empty{padding:0}.drafts-empty .slash-shortcuts-empty-copy{max-width:34rem}@media (max-width:760px){.slash-shortcuts-root{margin-top:.35rem}.slash-shortcuts-launchers{justify-content:stretch}.slash-shortcuts-launcher{flex:1 1 calc(50% - .25rem);justify-content:center}.slash-shortcuts-nav{flex-wrap:wrap;top:3.35rem}.slash-shortcuts-nav-button{flex:1 1 calc(50% - .25rem);justify-content:center}.slash-shortcuts-draft-card-actions-group{flex-direction:column}.slash-shortcuts-draft-action{justify-content:center}}
  
    .minimal-drafts-view{padding:.55rem;gap:.55rem}.slash-shortcuts-draft-scope-row.minimal{gap:.35rem}.slash-shortcuts-drafts-intro,.slash-shortcuts-draft-scope-meta,.slash-shortcuts-draft-card-scope,.slash-shortcuts-draft-card-note,.slash-shortcuts-draft-card-title-row.minimal{display:none!important}.slash-shortcuts-draft-list.minimal{gap:.5rem}.slash-shortcuts-draft-card.minimal{gap:.42rem;padding:.55rem .6rem;border-radius:10px;background:color-mix(in srgb,var(--color-panel) 96%,black 4%)}.slash-shortcuts-draft-card-preview.minimal{padding:0;border:0;background:transparent;font-size:.74rem;line-height:1.35;color:var(--color-text-secondary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.slash-shortcuts-draft-card-meta-row.minimal{display:flex;justify-content:flex-end}.slash-shortcuts-draft-card-actions-group.minimal{display:flex;gap:.35rem;justify-content:flex-start;flex-wrap:wrap}.slash-shortcuts-draft-action.minimal{padding:.34rem .55rem;border-radius:8px;min-width:2rem;justify-content:center;font-size:.72rem;font-weight:700}.slash-shortcuts-draft-action.minimal .material-symbols-outlined{font-size:.92rem}.slash-shortcuts-draft-action.minimal.secondary{border-color:color-mix(in srgb,#6f7cff 34%,var(--color-border));color:var(--color-text-secondary)}.drafts-empty.minimal{padding:.35rem .1rem;color:var(--color-text-muted)}@media (max-width:760px){.slash-shortcuts-draft-card-actions-group.minimal{flex-direction:column;align-items:stretch}.slash-shortcuts-draft-action.minimal{flex:1 1 auto;justify-content:flex-start}}

    .slash-shortcuts-popup.drafts-view{width:min(44rem,calc(100vw - 1rem))!important;min-width:min(44rem,calc(100vw - 1rem));min-height:min(26rem,calc(100vh - 7rem));max-height:min(78vh,42rem)}.slash-shortcuts-popup.drafts-view .minimal-drafts-view{padding:.48rem;gap:.42rem}.slash-shortcuts-popup.drafts-view .slash-shortcuts-draft-scope-row.minimal{gap:.3rem}.slash-shortcuts-popup.drafts-view .slash-shortcuts-nav-button.slash-shortcuts-draft-scope-button{padding:.28rem .55rem;font-size:.72rem}.slash-shortcuts-popup.drafts-view .slash-shortcuts-draft-list.minimal{gap:.42rem}.slash-shortcuts-popup.drafts-view .slash-shortcuts-draft-card.minimal{padding:.48rem .55rem;gap:.36rem}.slash-shortcuts-popup.drafts-view .slash-shortcuts-draft-card-preview.minimal{-webkit-line-clamp:3;font-size:.73rem;line-height:1.32}.slash-shortcuts-popup.drafts-view .slash-shortcuts-draft-card-actions-group.minimal{gap:.28rem}.slash-shortcuts-popup.drafts-view .slash-shortcuts-draft-action.minimal{padding:.28rem .46rem;font-size:.69rem}.slash-shortcuts-popup.drafts-view .slash-shortcuts-draft-action.minimal .material-symbols-outlined{font-size:.88rem}@media (max-width:760px){.slash-shortcuts-popup.drafts-view{width:calc(100vw - .6rem)!important;min-width:calc(100vw - .6rem);min-height:min(22rem,calc(100vh - 5rem));max-height:80vh}.slash-shortcuts-popup.drafts-view .slash-shortcuts-draft-action.minimal{justify-content:flex-start}}

    #progress-bar-right .slash-shortcuts-root{display:contents!important;margin-top:0!important}
    #progress-bar-right .slash-shortcuts-launchers{display:flex!important;justify-content:flex-end!important;align-items:center!important;gap:.5rem!important;flex-wrap:nowrap!important}
    #progress-bar-right .slash-shortcuts-launcher{background:transparent!important;border:0!important;box-shadow:none!important;border-radius:0!important;padding:0!important;color:var(--color-text-secondary)!important}
    #progress-bar-right .slash-shortcuts-launcher:hover,#progress-bar-right .slash-shortcuts-launcher.active{background:transparent!important;border-color:transparent!important;color:var(--color-text)!important}
    #progress-bar-right .slash-shortcuts-launcher.pin{background:transparent!important;border-color:transparent!important;color:var(--color-text-secondary)!important}
    #progress-bar-right .slash-shortcuts-count-badge{background:transparent!important;border:0!important;min-width:auto!important;height:auto!important;padding:0!important;border-radius:0!important;color:var(--color-text-secondary)!important}
    #progress-bar-right .slash-shortcuts-launcher .material-symbols-outlined{font-size:1rem}
    @media (max-width:760px){#progress-bar-right .slash-shortcuts-launchers{flex-wrap:wrap!important}#progress-bar-right .slash-shortcuts-launcher{justify-content:flex-end!important}}

  </style>
</body>
</html>
